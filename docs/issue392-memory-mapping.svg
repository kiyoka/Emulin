<text x="86" y="684.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#2b8a3e" font-weight="bold">   → 戦略: ① の割当も demand paging 化し「触れた GVA ページの分だけ GPA を割り当てる」ようにする (issue #392)。</text></svg>