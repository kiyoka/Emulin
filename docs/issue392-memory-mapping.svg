<text x="86" y="642.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#5f3dc4" font-weight="normal">★ V8 cage は GVA で大きく予約するが、現状は ① guest page table で GPA(物理プール)を全ページ eager に割当 → プール枯渇 (#389/#392)。</text>
