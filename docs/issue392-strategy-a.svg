<text x="86" y="642.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#5f3dc4" font-weight="normal">★ 戦略 A: cage の PROT_NONE 予約は ① guest page table で GPA を割り当てない (PTE not-present、mmapRegions に記録のみ)。</text>
<text x="86" y="663.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#212529" font-weight="normal">   後で V8 が mprotect(RW) で commit したサブ領域だけ sys_mprotect(syscall 10) を hook して allocData → ② host が backing。</text>
<text x="86" y="684.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#2b8a3e" font-weight="bold">   → プールには余裕が残り枯渇しない。#PF intercept 不要・syscall 層のみで軽量 (anonMmap と alloc_huge の両経路に適用)。</text></svg>