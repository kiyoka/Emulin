<text x="86" y="642.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#5f3dc4" font-weight="normal">★ 戦略 B: cage 全体を PTE not-present に。guest が触れた瞬間 #PF → guest IDT の hlt stub → VM exit → emulin が CR2(faulting GVA) を読む。</text>
<text x="86" y="663.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#212529" font-weight="normal">   そのページだけ allocData + mapPage → resume。触れた分だけ GPA を消費 (最小、Linux demand-zero と同一。全 sparse mmap に効く)。</text>
<text x="86" y="684.0" font-family="'Noto Sans CJK JP','Noto Sans CJK','sans-serif'" font-size="12.5" text-anchor="start" fill="#2b8a3e" font-weight="bold">   → 最小消費だが、guest IDT/GDT/TSS + CR2 reader が現状無く #PF 割込み基盤の新設が必要 (§8 Phase 4)。</text></svg>