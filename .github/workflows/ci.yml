name: CI

# Phase 28-4: ビルド + 軽量 regression を pull request / push 毎に実行する。
# real-binary を使う test は host 環境 (binary, sandbox files) に依存するので
# CI からは除外し、run-fast.sh のみ実行する (146 ケース、~30 秒)。

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build (mvn package)
        run: mvn -B -q package -DskipTests

      - name: Install tools
        run: |
          sudo apt-get update -qq
          # ash-* tests copy /usr/bin/busybox into sandbox without .so files,
          # so it MUST be statically linked. busybox-static provides /bin/busybox
          # as a static ELF; the plain `busybox` package on Ubuntu links
          # dynamically against libc which emulin can't load (no ld-linux/libc
          # in the sandbox).
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib busybox-static make build-essential
          # /usr/bin/busybox がない / 動的版だったら /bin/busybox (= static)
          # にシンボリックリンクして上書き
          if ! file /usr/bin/busybox 2>/dev/null | grep -q "statically linked"; then
            sudo ln -sf /bin/busybox /usr/bin/busybox
          fi
          file /usr/bin/busybox

      - name: Build test binaries
        run: make -C tests/binaries -j

      - name: Run fast regression
        # JOBS=2: ubuntu-latest runner は 2-4 core しかなく、run-fast.sh の
        # 並列 (binary tests + 7 ext script 同時 + ash-applet-survey 内部並列)
        # で JVM が過剰サブスクライブされると、emulin が稀に空 stdout を返す
        # flake (asurvey-grep-c/grep-v 等) が survey の retry でも 2 連続で
        # fail することがある。並列度を抑えて contention を下げる。
        run: JOBS=2 tests/scripts/run-fast.sh
